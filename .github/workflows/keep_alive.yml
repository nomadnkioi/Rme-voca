name: Keep Supabase Alive

on:
  schedule:
    # 3일마다 (월요일, 목요일) 한국 시간(KST) 오전 9시에 실행
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # 필요할 때 수동으로도 실행할 수 있게 하는 버튼 생성

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping to Supabase Auth Health Endpoint
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/auth/v1/health" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}"
